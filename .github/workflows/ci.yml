name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  qa:
    name: QA (type-check · knip · lint · format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Knip (dead code)
        run: npm run knip

      - name: Lint
        run: npx eslint . --max-warnings=0

      - name: Format check
        run: npx prettier --check .

  unit-tests:
    name: Unit Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --run
