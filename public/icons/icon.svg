<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <!-- Basketball circle -->
  <circle cx="256" cy="256" r="160" fill="#e07b30" stroke="#b85c1a" stroke-width="6"/>
  <!-- Basketball vertical curve left -->
  <path d="M256 96 Q196 176 196 256 Q196 336 256 416" fill="none" stroke="#8b3e0a" stroke-width="8" stroke-linecap="round"/>
  <!-- Basketball vertical curve right -->
  <path d="M256 96 Q316 176 316 256 Q316 336 256 416" fill="none" stroke="#8b3e0a" stroke-width="8" stroke-linecap="round"/>
  <!-- Basketball horizontal line -->
  <line x1="96" y1="256" x2="416" y2="256" stroke="#8b3e0a" stroke-width="8" stroke-linecap="round"/>
  <!-- Hand outline (gesture indicator) -->
  <g transform="translate(310,310)" fill="#ffffff" opacity="0.85">
    <!-- Palm -->
    <ellipse cx="30" cy="50" rx="28" ry="30" fill="rgba(255,255,255,0.9)"/>
    <!-- Fingers -->
    <rect x="6" y="14" width="12" height="36" rx="6" fill="rgba(255,255,255,0.9)"/>
    <rect x="20" y="6" width="12" height="44" rx="6" fill="rgba(255,255,255,0.9)"/>
    <rect x="34" y="8" width="12" height="42" rx="6" fill="rgba(255,255,255,0.9)"/>
    <rect x="48" y="16" width="12" height="36" rx="6" fill="rgba(255,255,255,0.9)"/>
    <!-- Thumb -->
    <rect x="-8" y="36" width="12" height="28" rx="6" transform="rotate(-20,-8,50)" fill="rgba(255,255,255,0.9)"/>
  </g>
</svg>
